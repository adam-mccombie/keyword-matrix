<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Winery Keyword Matrix</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── BRAND TOKENS (City Winery) ───────────────────────── */
:root {
  --bg: #f6efea;
  --surface: #ffffff;
  --surface2: #f0e8e2;
  --surface3: #e8ddd6;
  --border: #e0d4cc;
  --border2: #c8b8ae;
  --text: #0A0A0A;
  --text-mid: #5a4f49;
  --text-soft: #9c8f88;
  --ink: #0A0A0A;
  --accent: #8F1A4C;
  --accent-dark: #6e1239;
  --accent-light: #f9edf3;
  --accent-border: #e8b8cf;
  --red: #c0392b;
  --red-bg: #fdf0ee;
  --yellow: #92650a;
  --yellow-bg: #fdf6e3;
  --green: #1d6348;
  --green-bg: #e5f2ec;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ─── PANELS ─────────────────────────────────────────── */
.panel { display: none; }
.panel.active { display: block; }

/* ─── TOPBAR ─────────────────────────────────────────── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 28px; display: flex; align-items: center; height: 54px;
  gap: 12px; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.logo { font-family: var(--serif); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); line-height: 1.15; white-space: nowrap; }
.logo em { color: var(--accent); font-style: italic; }

/* segmented toggle */
.seg-toggle {
  display: flex; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 3px; gap: 2px;
}
.seg-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer;
  color: var(--text-mid); background: transparent;
  transition: all 0.15s; white-space: nowrap;
}
.seg-btn.active {
  background: var(--surface); color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.seg-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.6); }

.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.chip {
  font-size: 12px; font-weight: 500; color: var(--text-soft);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px;
}

/* ─── TOOLBAR ────────────────────────────────────────── */
.toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 32px; display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
}
.search-wrap { position: relative; }
.si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-soft); font-size: 15px; pointer-events: none; }
input.search {
  font-family: var(--sans); font-size: 13px;
  padding: 7px 12px 7px 30px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); width: 200px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
input.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(143,26,76,0.1); }
select.flt {
  font-family: var(--sans); font-size: 13px; padding: 7px 11px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text-mid); outline: none; cursor: pointer;
}
select.flt:hover { border-color: var(--border2); }
.sp { flex: 1; }
.btn {
  font-family: var(--sans); font-weight: 600; font-size: 13px;
  padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(143,26,76,0.25); }
.btn-outline { background: transparent; color: var(--text-mid); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

/* ─── MAIN ───────────────────────────────────────────── */
.main { padding: 24px 32px; max-width: 1100px; margin: 0 auto; }

/* ─── GROUP GRID ─────────────────────────────────────── */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 28px; }
.group-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 13px; padding: 20px 20px 16px; cursor: pointer;
  transition: all 0.18s; position: relative; overflow: hidden;
}
.group-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(143,26,76,0.08); }
.group-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--gc-color,var(--accent)); }
.gc-name { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.gc-count { font-size: 12px; color: var(--text-soft); }
.gc-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.gc-pill { font-size: 11px; color: var(--text-mid); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.gc-more { font-size: 11px; color: var(--text-soft); padding: 2px 5px; }

/* ─── SECTION SEPARATOR ──────────────────────────────── */
.section-sep { display: flex; align-items: center; gap: 12px; margin: 24px 0 12px; }
.section-sep h2 { font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.section-sep-line { flex: 1; height: 1px; background: var(--border); }
.section-sep .sec-chip { font-size: 11px; font-weight: 600; color: var(--text-soft); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

/* ─── PAGE CARDS ─────────────────────────────────────── */
.cards-list { display: flex; flex-direction: column; gap: 9px; }
.page-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; overflow: hidden; transition: box-shadow 0.15s, border-color 0.15s; }
.page-card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
.card-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; }
.card-header:hover .page-url { color: var(--accent); }
.page-info { flex: 1; min-width: 0; }
.page-url { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
.page-note { font-size: 12px; color: var(--text-soft); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-chips { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.pillar-pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.loc-chip { font-size: 11px; color: var(--text-mid); background: var(--surface2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.primary-rank { text-align: center; min-width: 46px; }
.primary-rank .rn { font-family: var(--serif); font-size: 22px; font-weight: 600; line-height: 1; }
.primary-rank .rl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-top: 1px; }
.chevron { color: var(--text-soft); font-size: 18px; transition: transform 0.2s; flex-shrink: 0; line-height: 1; }
.page-card.open .chevron { transform: rotate(180deg); }
.card-body { display: none; border-top: 1px solid var(--border); }
.page-card.open .card-body { display: block; }

.kw-table { width: 100%; border-collapse: collapse; }
.kw-table thead tr { background: var(--surface2); }
.kw-table th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); padding: 8px 18px; text-align: left; border-bottom: 1px solid var(--border); }
.kw-table td { padding: 11px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.kw-table tr:last-child td { border-bottom: none; }

.kw-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 3px 7px; border-radius: 4px; }
.kw-p { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-border); }
.kw-s { background: var(--surface2); color: var(--text-soft); border: 1px solid var(--border); }
.kw-word { font-weight: 600; font-size: 14px; }
.vol-num { font-size: 13px; font-weight: 500; color: var(--text-mid); }
.vol-bar-bg { background: var(--border); border-radius: 3px; height: 4px; width: 80px; margin-top: 4px; overflow: hidden; }
.vol-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); opacity: 0.5; }
.rank-row { display: flex; align-items: center; gap: 7px; }
.rn-lg { font-family: var(--serif); font-size: 21px; font-weight: 600; line-height: 1; min-width: 36px; }
.rlb { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
.rlb-g { background: var(--green-bg); color: var(--green); }
.rlb-y { background: var(--yellow-bg); color: var(--yellow); }
.rlb-r { background: var(--red-bg); color: var(--red); }

/* difficulty badge */
.diff-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.diff-easy { background: var(--green-bg); color: var(--green); }
.diff-medium { background: var(--yellow-bg); color: var(--yellow); }
.diff-hard { background: var(--red-bg); color: var(--red); }

.card-footer { display: flex; gap: 7px; padding: 10px 18px; border-top: 1px solid var(--border); background: var(--surface2); }
.icon-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--text-mid); cursor: pointer; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--border2); color: var(--text); }
.icon-btn.del:hover { border-color: #f5c6c6; color: var(--red); background: var(--red-bg); }

.empty { text-align: center; padding: 72px 20px; color: var(--text-soft); }
.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
.empty h3 { font-family: var(--serif); font-size: 26px; color: var(--text-mid); margin-bottom: 7px; }
.empty p { font-size: 13px; }

/* ─── MODAL ──────────────────────────────────────────── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,10,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 540px; max-width: 100%; box-shadow: 0 28px 60px rgba(0,0,0,0.18); overflow: hidden; animation: slideUp 0.18s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
.modal-head h2 { font-family: var(--serif); font-size: 24px; font-weight: 600; }
.modal-head p { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; max-height: 66vh; overflow-y: auto; }
.sec-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); padding-bottom: 7px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; }
.kw-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 14px; display: flex; flex-direction: column; gap: 11px; }
.form-row { display: grid; gap: 11px; }
.cols2 { grid-template-columns: 1fr 1fr; }
.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-mid); }
.field input, .field select { font-family: var(--sans); font-size: 13px; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; }
.field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(143,26,76,0.1); }
.field input::placeholder { color: var(--text-soft); }
.modal-foot { padding: 13px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 9px; background: var(--surface2); }

/* pillar color pills */
.p0 { background: #fce8f0; color: #8F1A4C; border: 1px solid #e8b8cf; }
.p1 { background: #e8f0fe; color: #1a56db; border: 1px solid #c5d8fc; }
.p2 { background: #ceead6; color: #137333; border: 1px solid #a8d5b5; }
.p3 { background: #fde7c3; color: #b45309; border: 1px solid #f5cc88; }
.p4 { background: #f3e8fd; color: #7b1fa2; border: 1px solid #d5b0f0; }
.p5 { background: #e0f2fe; color: #0369a1; border: 1px solid #a5d8f8; }

/* hidden CSV input */
#csv-input { display: none; }

@media (max-width: 680px) {
  .topbar, .toolbar, .main { padding-left: 14px; padding-right: 14px; }
  .cols2, .cols3 { grid-template-columns: 1fr; }
  .card-header { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════ TOPBAR -->
<div class="topbar">
  <div class="logo">City Winery<br><em>Keyword Matrix</em></div>
  <div class="seg-toggle">
    <button class="seg-btn active" id="seg-location" onclick="switchPanel('location')">By Location</button>
    <button class="seg-btn" id="seg-pillar" onclick="switchPanel('pillar')">By Pillar</button>
  </div>
  <div class="topbar-right">
    <span class="chip" id="global-chip"></span>
    <button class="btn btn-outline" onclick="triggerImport()">↑ Import</button>
    <button class="btn btn-outline" onclick="exportCSV()">↓ Export</button>
    <button class="btn btn-primary" onclick="openAdd()">+ Add Page</button>
  </div>
</div>

<!-- ═══════════════════════════════════════ LOCATION PANEL -->
<div id="panel-location" class="panel active">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input class="search" id="location-search" placeholder="Search…" oninput="renderLocationPages()" />
    </div>
    <select class="flt" id="location-filter" onchange="renderLocationPages()">
      <option value="">All Locations</option>
    </select>
    <select class="flt" id="location-pillar-filter" onchange="renderLocationPages()">
      <option value="">All Pillars</option>
    </select>
    <div class="sp"></div>
  </div>
  <div class="main">
    <div id="location-groups"></div>
    <div id="location-pages"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════ PILLAR PANEL -->
<div id="panel-pillar" class="panel">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input class="search" id="pillar-search" placeholder="Search…" oninput="renderPillarPages()" />
    </div>
    <select class="flt" id="pillar-filter" onchange="renderPillarPages()">
      <option value="">All Pillars</option>
    </select>
    <select class="flt" id="pillar-location-filter" onchange="renderPillarPages()">
      <option value="">All Locations</option>
    </select>
    <div class="sp"></div>
  </div>
  <div class="main">
    <div id="pillar-groups"></div>
    <div id="pillar-pages"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════ MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="m-title">Add Page</h2>
      <p id="m-sub">Enter the page URL and its target keywords.</p>
    </div>
    <div class="modal-body">
      <div>
        <div class="sec-head">Page Details</div>
        <div class="form-row cols2" style="margin-top:11px;margin-bottom:11px">
          <div class="field"><label>Page URL *</label><input id="f-url" type="text" placeholder="pages/locations/new-york-city" /></div>
          <div class="field"><label>Page Title</label><input id="f-title" type="text" placeholder="e.g. New York Menus" /></div>
        </div>
        <div class="form-row cols2">
          <div class="field">
            <label>Pillar</label>
            <select id="f-pillar-sel" style="font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;width:100%">
              <option value="">No pillar</option>
              <option>Shows</option>
              <option>Restaurant</option>
              <option>Wine</option>
              <option>Private Events</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label>Location</label>
            <select id="f-loc-sel" style="font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;width:100%">
              <option value="">Not set</option>
              <option>Atlanta</option>
              <option>Boston</option>
              <option>Chicago</option>
              <option>City Vineyard</option>
              <option>Hudson Valley</option>
              <option>Nashville</option>
              <option>New York City</option>
              <option>Philadelphia</option>
              <option>Pittsburgh</option>
              <option>St. Louis</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-head"><span class="kw-badge kw-p">Primary</span> Target Keyword</div>
        <div class="kw-block" style="margin-top:9px">
          <div class="form-row cols2">
            <div class="field"><label>Keyword *</label><input id="pk-word" type="text" placeholder="e.g. city winery new york" /></div>
            <div class="field"><label>Search Volume / mo</label><input id="pk-vol" type="number" placeholder="e.g. 5400" /></div>
          </div>
          <div class="form-row cols2">
            <div class="field"><label>Current Rank</label><input id="pk-rank" type="number" placeholder="e.g. 8" /></div>
            <div class="field">
              <label>Difficulty</label>
              <select id="pk-diff" style="font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;width:100%">
                <option value="">—</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-head"><span class="kw-badge kw-s">Secondary 1</span> Supporting Keyword</div>
        <div class="kw-block" style="margin-top:9px">
          <div class="form-row cols2">
            <div class="field"><label>Keyword</label><input id="s1-word" type="text" placeholder="Optional" /></div>
            <div class="field"><label>Search Volume / mo</label><input id="s1-vol" type="number" /></div>
          </div>
          <div class="form-row cols2">
            <div class="field"><label>Current Rank</label><input id="s1-rank" type="number" /></div>
            <div class="field">
              <label>Difficulty</label>
              <select id="s1-diff" style="font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;width:100%">
                <option value="">—</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-head"><span class="kw-badge kw-s">Secondary 2</span> Supporting Keyword</div>
        <div class="kw-block" style="margin-top:9px">
          <div class="form-row cols2">
            <div class="field"><label>Keyword</label><input id="s2-word" type="text" placeholder="Optional" /></div>
            <div class="field"><label>Search Volume / mo</label><input id="s2-vol" type="number" /></div>
          </div>
          <div class="form-row cols2">
            <div class="field"><label>Current Rank</label><input id="s2-rank" type="number" /></div>
            <div class="field">
              <label>Difficulty</label>
              <select id="s2-diff" style="font-family:var(--sans);font-size:13px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none;width:100%">
                <option value="">—</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save Page</button>
    </div>
  </div>
</div>

<input type="file" id="csv-input" accept=".csv" onchange="importCSV(event)" />

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const PILLARS = ['Shows','Restaurant','Wine','Private Events','Other'];
const LOCATIONS = ['Atlanta','Boston','Chicago','City Vineyard','Hudson Valley','Nashville','New York City','Philadelphia','Pittsburgh','St. Louis'];

const PILLAR_COLORS = ['p0','p1','p2','p3','p4','p5'];
const PILLAR_HEX = ['#8F1A4C','#1a56db','#137333','#b45309','#7b1fa2','#0369a1'];
const pillarMap = {}; let pillarIdx = 0;
function pc(p) {
  if(!p) return {cls:'',hex:'#9c8f88'};
  if(!pillarMap[p]) { pillarMap[p]={cls:PILLAR_COLORS[pillarIdx%6],hex:PILLAR_HEX[pillarIdx%6]}; pillarIdx++; }
  return pillarMap[p];
}

let pages = [
  { id:1, url:'pages/locations/new-york-city', title:'New York Menus', pillar:'Restaurant', loc:'New York City',

let nextId = 6, editId = null, currentView = 'location';

// ─── UTILS ───────────────────────────────────────────────────────────────────
function rankColor(r){return r<=3?'var(--green)':r<=10?'var(--yellow)':'var(--red)';}
function rankBadge(r){return r<=3?'rlb-g':r<=10?'rlb-y':'rlb-r';}
function rankLabel(r){return r<=3?'Top 3':r<=10?'Top 10':'Pg '+Math.ceil(r/10);}
function fmtVol(v){if(!v)return'—';return v>=1000?(v/1000).toFixed(v>=10000?0:1)+'k':v;}
function maxVol(){let m=1;pages.forEach(p=>{[p.pk,p.s1,p.s2].forEach(k=>{if(k&&k.vol)m=Math.max(m,k.vol);});});return m;}

function diffBadge(d) {
  if(!d) return '—';
  const cls = d==='Easy'?'diff-easy':d==='Medium'?'diff-medium':'diff-hard';
  return `<span class="diff-badge ${cls}">${d}</span>`;
}

function kwRow(kw, type, mv) {
  if(!kw||!kw.w) return '';
  const badge = type==='pk'
    ? `<span class="kw-badge kw-p">Primary</span>`
    : `<span class="kw-badge kw-s">${type==='s1'?'Sec 1':'Sec 2'}</span>`;
  const pct = kw.vol?Math.round(kw.vol/mv*100):0;
  const rankHtml = kw.rank
    ? `<div class="rank-row"><span class="rn-lg" style="color:${rankColor(kw.rank)}">#${kw.rank}</span><span class="rlb ${rankBadge(kw.rank)}">${rankLabel(kw.rank)}</span></div>`
    : `<span style="color:var(--text-soft)">—</span>`;
  return `<tr>
    <td>${badge}</td>
    <td><span class="kw-word">${kw.w}</span></td>
    <td><div class="vol-num">${fmtVol(kw.vol)}</div>${kw.vol?`<div class="vol-bar-bg"><div class="vol-bar-fill" style="width:${pct}%"></div></div>`:''}</td>
    <td>${rankHtml}</td>
    <td>${diffBadge(kw.diff)}</td>
  </tr>`;
}

function pageCardHTML(p) {
  const mv = maxVol();
  const pInfo = pc(p.pillar);
  const pillarHtml = p.pillar ? `<span class="pillar-pill ${pInfo.cls}">${p.pillar}</span>` : '';
  const locHtml = p.loc ? `<span class="loc-chip">${p.loc}</span>` : '';
  const prankHtml = p.pk.rank
    ? `<div class="primary-rank"><div class="rn" style="color:${rankColor(p.pk.rank)}">#${p.pk.rank}</div><div class="rl">primary</div></div>`
    : '';
  return `<div class="page-card" id="card-${p.id}">
    <div class="card-header" onclick="toggleCard(${p.id})">
      <div class="page-info">
        <div class="page-url">${p.url}</div>
        ${p.title?`<div class="page-note">${p.title}</div>`:''}
      </div>
      <div class="header-chips">${pillarHtml}${locHtml}</div>
      ${prankHtml}
      <span class="chevron">⌄</span>
    </div>
    <div class="card-body">
      <table class="kw-table">
        <thead><tr><th>Type</th><th>Keyword</th><th>Volume</th><th>Rank</th><th>Difficulty</th></tr></thead>
        <tbody>
          ${kwRow(p.pk,'pk',mv)}
          ${kwRow(p.s1,'s1',mv)}
          ${kwRow(p.s2,'s2',mv)}
        </tbody>
      </table>
      <div class="card-footer">
        <button class="icon-btn" onclick="editEntry(${p.id})">✏ Edit</button>
        <button class="icon-btn del" onclick="delEntry(${p.id})">✕ Delete</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) { document.getElementById('card-'+id)?.classList.toggle('open'); }

// ─── PANEL SWITCHING ─────────────────────────────────────────────────────────
function switchPanel(name) {
  currentView = name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('seg-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='location') { syncLocationFilters(); renderLocationGroups(); renderLocationPages(); }
  if(name==='pillar') { syncPillarFilters(); renderPillarGroups(); renderPillarPages(); }
  updateChip();
}

function updateChip() {
  const locs = [...new Set(pages.map(p=>p.loc).filter(Boolean))].length;
  const pillars = [...new Set(pages.map(p=>p.pillar).filter(Boolean))].length;
  document.getElementById('global-chip').textContent =
    currentView==='location'
      ? `${locs} location${locs!==1?'s':''}`
      : `${pillars} pillar${pillars!==1?'s':''}`;
}

function refreshCurrentView() {
  if(currentView==='location') { syncLocationFilters(); renderLocationGroups(); renderLocationPages(); }
  if(currentView==='pillar') { syncPillarFilters(); renderPillarGroups(); renderPillarPages(); }
  updateChip();
}

// ─── FILTER SYNC ─────────────────────────────────────────────────────────────
function syncPillarFilters() {
  const pillars = [...new Set(pages.map(p=>p.pillar).filter(Boolean))].sort();
  const locs = [...new Set(pages.map(p=>p.loc).filter(Boolean))].sort();
  const pf = document.getElementById('pillar-filter');
  const lf = document.getElementById('pillar-location-filter');
  const cp = pf.value, cl = lf.value;
  pf.innerHTML = `<option value="">All Pillars</option>` + pillars.map(t=>`<option ${t===cp?'selected':''}>${t}</option>`).join('');
  lf.innerHTML = `<option value="">All Locations</option>` + locs.map(l=>`<option ${l===cl?'selected':''}>${l}</option>`).join('');
}

function syncLocationFilters() {
  const locs = [...new Set(pages.map(p=>p.loc).filter(Boolean))].sort();
  const pillars = [...new Set(pages.map(p=>p.pillar).filter(Boolean))].sort();
  const lf = document.getElementById('location-filter');
  const pf = document.getElementById('location-pillar-filter');
  const cl = lf.value, cp = pf.value;
  lf.innerHTML = `<option value="">All Locations</option>` + locs.map(l=>`<option ${l===cl?'selected':''}>${l}</option>`).join('');
  pf.innerHTML = `<option value="">All Pillars</option>` + pillars.map(t=>`<option ${t===cp?'selected':''}>${t}</option>`).join('');
}

// ─── LOCATION PANEL ──────────────────────────────────────────────────────────
function renderLocationGroups() {
  const fltLoc = document.getElementById('location-filter').value;
  const fltPillar = document.getElementById('location-pillar-filter').value;
  const container = document.getElementById('location-groups');
  if(fltLoc || fltPillar) { container.innerHTML=''; return; }

  const locs = [...new Set(pages.map(p=>p.loc).filter(Boolean))].sort();
  container.innerHTML = `<div class="group-grid">${locs.map((loc,i)=>{
    const lp = pages.filter(p=>p.loc===loc);
    const hex = PILLAR_HEX[i % PILLAR_HEX.length];
    const titles = lp.slice(0,3).map(p=>`<span class="gc-pill">${p.title||p.url}</span>`).join('');
    const more = lp.length>3?`<span class="gc-more">+${lp.length-3} more</span>`:'';
    return `<div class="group-card" style="--gc-color:${hex}" onclick="filterByLocation('${loc}')">
      <div class="gc-name">${loc}</div>
      <div class="gc-count">${lp.length} page${lp.length!==1?'s':''}</div>
      <div class="gc-pills">${titles}${more}</div>
    </div>`;
  }).join('')}</div>`;
}

function filterByLocation(name) {
  document.getElementById('location-filter').value = name;
  renderLocationGroups();
  renderLocationPages();
}

function renderLocationPages() {
  const q = document.getElementById('location-search').value.toLowerCase();
  const fltLoc = document.getElementById('location-filter').value;
  const fltPillar = document.getElementById('location-pillar-filter').value;
  renderLocationGroups();
  const filtered = pages.filter(p=>{
    if(fltLoc && p.loc!==fltLoc) return false;
    if(fltPillar && p.pillar!==fltPillar) return false;
    if(q){const h=[p.url,p.title||'',p.pk.w,p.s1&&p.s1.w||'',p.s2&&p.s2.w||''].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  const container = document.getElementById('location-pages');
  if(!fltLoc && !fltPillar && !q) { container.innerHTML=''; return; }
  if(!filtered.length) { container.innerHTML=`<div class="empty"><div class="empty-icon">📍</div><h3>No pages found</h3><p>Try adjusting your filters.</p></div>`; return; }
  const headerLabel = [fltLoc,fltPillar].filter(Boolean).join(' · ') || 'Results';
  container.innerHTML = `
    <div class="section-sep"><h2>${headerLabel}</h2><div class="section-sep-line"></div><span class="sec-chip">${filtered.length} page${filtered.length!==1?'s':''}</span></div>
    <div class="cards-list">${filtered.map(p=>pageCardHTML(p)).join('')}</div>`;
}

// ─── PILLAR PANEL ─────────────────────────────────────────────────────────────
function renderPillarGroups() {
  const fltPillar = document.getElementById('pillar-filter').value;
  const fltLoc = document.getElementById('pillar-location-filter').value;
  const container = document.getElementById('pillar-groups');
  if(fltPillar || fltLoc) { container.innerHTML=''; return; }
  const pillars = [...new Set(pages.map(p=>p.pillar).filter(Boolean))].sort();
  container.innerHTML = `<div class="group-grid">${pillars.map((pillar)=>{
    const pp = pages.filter(p=>p.pillar===pillar);
    const pInfo = pc(pillar);
    const titles = pp.slice(0,3).map(p=>`<span class="gc-pill">${p.title||p.url}</span>`).join('');
    const more = pp.length>3?`<span class="gc-more">+${pp.length-3} more</span>`:'';
    return `<div class="group-card" style="--gc-color:${pInfo.hex}" onclick="filterByPillar('${pillar}')">
      <div class="gc-name">${pillar}</div>
      <div class="gc-count">${pp.length} page${pp.length!==1?'s':''}</div>
      <div class="gc-pills">${titles}${more}</div>
    </div>`;
  }).join('')}</div>`;
}

function filterByPillar(name) {
  document.getElementById('pillar-filter').value = name;
  renderPillarGroups();
  renderPillarPages();
}

function renderPillarPages() {
  const q = document.getElementById('pillar-search').value.toLowerCase();
  const fltPillar = document.getElementById('pillar-filter').value;
  const fltLoc = document.getElementById('pillar-location-filter').value;
  renderPillarGroups();
  const filtered = pages.filter(p=>{
    if(fltPillar && p.pillar!==fltPillar) return false;
    if(fltLoc && p.loc!==fltLoc) return false;
    if(q){const h=[p.url,p.title||'',p.pk.w,p.s1&&p.s1.w||'',p.s2&&p.s2.w||''].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  const container = document.getElementById('pillar-pages');
  if(!fltPillar && !fltLoc && !q) { container.innerHTML=''; return; }
  if(!filtered.length) { container.innerHTML=`<div class="empty"><div class="empty-icon">📂</div><h3>No pages found</h3><p>Try adjusting your filters.</p></div>`; return; }
  const headerLabel = [fltPillar,fltLoc].filter(Boolean).join(' · ') || 'Results';
  container.innerHTML = `
    <div class="section-sep"><h2>${headerLabel}</h2><div class="section-sep-line"></div><span class="sec-chip">${filtered.length} page${filtered.length!==1?'s':''}</span></div>
    <div class="cards-list">${filtered.map(p=>pageCardHTML(p)).join('')}</div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  document.getElementById('m-title').textContent = 'Add Page';
  document.getElementById('m-sub').textContent = 'Enter the page URL and its target keywords.';
  ['f-url','f-title','pk-word','pk-vol','pk-rank','s1-word','s1-vol','s1-rank','s2-word','s2-vol','s2-rank'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['f-pillar-sel','f-loc-sel','pk-diff','s1-diff','s2-diff'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('overlay').classList.add('open');
}

function editEntry(id) {
  const p=pages.find(x=>x.id===id); if(!p)return;
  editId=id;
  document.getElementById('m-title').textContent='Edit Page';
  document.getElementById('m-sub').textContent='Update this page and its keywords.';
  document.getElementById('f-url').value=p.url;
  document.getElementById('f-title').value=p.title||'';
  document.getElementById('f-pillar-sel').value=p.pillar||'';
  document.getElementById('f-loc-sel').value=p.loc||'';
  const sv=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val!=null?val:'';};
  sv('pk-word',p.pk.w);sv('pk-vol',p.pk.vol);sv('pk-rank',p.pk.rank);sv('pk-diff',p.pk.diff||'');
  sv('s1-word',p.s1&&p.s1.w||'');sv('s1-vol',p.s1&&p.s1.vol);sv('s1-rank',p.s1&&p.s1.rank);sv('s1-diff',p.s1&&p.s1.diff||'');
  sv('s2-word',p.s2&&p.s2.w||'');sv('s2-vol',p.s2&&p.s2.vol);sv('s2-rank',p.s2&&p.s2.rank);sv('s2-diff',p.s2&&p.s2.diff||'');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function readKw(pre){
  const w=document.getElementById(pre+'-word').value.trim();
  if(!w)return{w:'',vol:null,rank:null,diff:''};
  const gn=id=>{const v=document.getElementById(id).value;return v!==''?parseFloat(v):null;};
  return{w,vol:gn(pre+'-vol'),rank:gn(pre+'-rank'),diff:document.getElementById(pre+'-diff').value};
}

function saveEntry(){
  const url=document.getElementById('f-url').value.trim();
  if(!url){alert('Page URL is required.');return;}
  if(!document.getElementById('pk-word').value.trim()){alert('Primary keyword is required.');return;}
  const obj={
    id:editId||nextId++,
    url,
    title:document.getElementById('f-title').value.trim(),
    pillar:document.getElementById('f-pillar-sel').value,
    loc:document.getElementById('f-loc-sel').value,
    pk:readKw('pk'),s1:readKw('s1'),s2:readKw('s2'),
  };
  if(editId)pages=pages.map(p=>p.id===editId?obj:p);
  else pages.push(obj);
  closeModal();
  refreshCurrentView();
}

function delEntry(id){
  if(confirm('Delete this page and all its keywords?')){
    pages=pages.filter(p=>p.id!==id);
    refreshCurrentView();
  }
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV(){
  const hdrs=['Page URL','Title','Pillar','Location','Primary KW','Primary Vol','Primary Rank','Primary Diff','Sec1 KW','Sec1 Vol','Sec1 Rank','Sec1 Diff','Sec2 KW','Sec2 Vol','Sec2 Rank','Sec2 Diff'];
  const rows=pages.map(p=>[
    p.url,p.title||'',p.pillar||'',p.loc||'',
    p.pk.w,p.pk.vol||'',p.pk.rank||'',p.pk.diff||'',
    p.s1&&p.s1.w||'',p.s1&&p.s1.vol||'',p.s1&&p.s1.rank||'',p.s1&&p.s1.diff||'',
    p.s2&&p.s2.w||'',p.s2&&p.s2.vol||'',p.s2&&p.s2.rank||'',p.s2&&p.s2.diff||''
  ]);
  const csv=[hdrs,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='city-winery-keyword-matrix.csv';a.click();
}

// ─── CSV IMPORT ───────────────────────────────────────────────────────────────
function triggerImport(){ document.getElementById('csv-input').click(); }

function importCSV(event) {
  const file = event.target.files[0]; if(!file)return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length < 2) { alert('CSV appears empty.'); return; }
    function parseRow(line) {
      const result=[]; let cur='', inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
        else if(ch===','&&!inQ){result.push(cur.trim());cur='';}
        else cur+=ch;
      }
      result.push(cur.trim()); return result;
    }
    const imported = [];
    for(let i=1;i<lines.length;i++){
      const cols = parseRow(lines[i]);
      const get = (idx) => idx>=0&&idx<cols.length ? cols[idx] : '';
      const url = get(0); if(!url) continue;
      imported.push({
        id: nextId++,
        url, title: get(1), pillar: get(2), loc: get(3),
        pk: { w:get(4), vol:parseFloat(get(5))||null, rank:parseFloat(get(6))||null, diff:get(7)||'' },
        s1: { w:get(8), vol:parseFloat(get(9))||null, rank:parseFloat(get(10))||null, diff:get(11)||'' },
        s2: { w:get(12), vol:parseFloat(get(13))||null, rank:parseFloat(get(14))||null, diff:get(15)||'' },
      });
    }
    if(!imported.length){ alert('No valid rows found in CSV.'); return; }
    pages = [...pages, ...imported];
    const seen = new Map();
    [...pages].reverse().forEach(p=>{ if(!seen.has(p.url)) seen.set(p.url,p); });
    pages = [...seen.values()].reverse();
    event.target.value = '';
    alert(`Successfully imported ${imported.length} page(s).`);
    refreshCurrentView();
  };
  reader.readAsText(file);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
switchPanel('location');
